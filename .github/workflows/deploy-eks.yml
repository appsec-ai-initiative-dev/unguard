name: Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Helm chart version to deploy (e.g. 0.23.0-cc934f4)'
        required: true
        default: '0.23.0-cc934f4'
      cluster_name:
        description: 'EKS cluster name'
        required: false
        default: 'appsec-ai-test'
      aws_region:
        description: 'AWS region'
        required: false
        default: 'us-east-1'

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          role-session-name: GitHubActionsEKSDeploy

      - name: Register this role as an EKS access entry
        run: |
          # Convert STS assumed-role ARN -> IAM role ARN
          STS_ARN=$(aws sts get-caller-identity --query Arn --output text)
          ROLE_ARN=$(echo "$STS_ARN" | sed 's|:sts:|:iam:|; s|:assumed-role/|:role/|; s|/[^/]*$||')
          echo "Registering $ROLE_ARN on cluster ${{ inputs.cluster_name }}"
          aws eks create-access-entry \
            --cluster-name ${{ inputs.cluster_name }} \
            --principal-arn "$ROLE_ARN" \
            --region ${{ inputs.aws_region }} 2>/dev/null \
            && echo "Access entry created" || echo "Access entry already exists, continuing"
          aws eks associate-access-policy \
            --cluster-name ${{ inputs.cluster_name }} \
            --principal-arn "$ROLE_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region ${{ inputs.aws_region }} 2>/dev/null \
            && echo "Policy associated" || echo "Policy already associated, continuing"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ inputs.cluster_name }} \
            --region ${{ inputs.aws_region }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${GHCR_PAT:-$GITHUB_TOKEN}"
          echo "$TOKEN" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve chart namespace
        id: chart
        env:
          GHCR_NAMESPACE: ${{ secrets.GHCR_NAMESPACE }}
        run: |
          NS="${GHCR_NAMESPACE:-${{ github.repository }}}"
          NS=$(echo "$NS" | tr '[:upper:]' '[:lower:]')
          echo "version=${{ inputs.chart_version }}" >> "$GITHUB_OUTPUT"
          echo "namespace=$NS" >> "$GITHUB_OUTPUT"

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ inputs.cluster_name }} \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=arn:aws:iam::016886142452:role/AmazonEKSLoadBalancerControllerRole \
            --set replicaCount=1 \
            --set vpcId=vpc-0ad0ebeebac2fa73f \
            --wait --timeout 5m || {
              echo "=== LB Controller pod status ==="
              kubectl get pods -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller -o wide
              echo "=== LB Controller logs ==="
              kubectl logs -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller --tail=50 --previous 2>/dev/null || \
              kubectl logs -n kube-system -l app.kubernetes.io/name=aws-load-balancer-controller --tail=50 2>/dev/null || true
              exit 1
            }

      - name: Install MariaDB (prerequisite)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          # Reuse existing password if secret exists
          EXTRA_ARGS=""
          if kubectl get secret unguard-mariadb -n unguard &>/dev/null; then
            EXISTING_PW=$(kubectl get secret unguard-mariadb -n unguard \
              -o jsonpath="{.data.mariadb-root-password}" | base64 -d)
            EXTRA_ARGS="--set auth.rootPassword=${EXISTING_PW}"
          fi
          # Delete the StatefulSet if it exists so Helm can recreate with updated spec
          kubectl delete statefulset unguard-mariadb -n unguard --ignore-not-found
          helm upgrade --install unguard-mariadb bitnami/mariadb \
            --namespace unguard \
            --create-namespace \
            --set primary.persistence.enabled=false \
            --wait --timeout 5m \
            $EXTRA_ARGS

      - name: Deploy with Helm
        run: |
          helm upgrade --install unguard \
            "oci://ghcr.io/${{ steps.chart.outputs.namespace }}/unguard" \
            --version "${{ steps.chart.outputs.version }}" \
            --namespace unguard \
            --create-namespace \
            --set aws.enabled=true \
            --set envoyProxy.service.type=LoadBalancer \
            --set "envoyProxy.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-type=external" \
            --set "envoyProxy.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-nlb-target-type=instance" \
            --set "envoyProxy.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-scheme=internet-facing" \
            --force-conflicts \
            --wait --timeout 10m

      - name: Print app URL
        run: |
          echo "Waiting for LoadBalancer hostname..."
          for i in $(seq 1 18); do
            HOSTNAME=$(kubectl get svc unguard-envoy-proxy -n unguard \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$HOSTNAME" ]; then
              echo "App URL: http://$HOSTNAME"
              exit 0
            fi
            echo "  waiting... ($i/18)"
            sleep 10
          done
          echo "LoadBalancer hostname not yet assigned (ELB may still be provisioning)"

      - name: Show pod status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n unguard -o wide
          echo ""
          echo "=== Not-ready pods (excluding cronjobs) ==="
          kubectl get pods -n unguard -o json | \
            jq -r '.items[] | select(.status.phase != "Running" and (.metadata.ownerReferences[]?.kind != "Job")) | .metadata.name' 2>/dev/null | \
            xargs -r -I{} kubectl describe pod {} -n unguard | \
            grep -A 10 "Events:\|Reason:\|Message:" || true
