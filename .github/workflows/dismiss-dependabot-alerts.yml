name: Dismiss Not-Confirmed Dependabot Alerts

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dismiss-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Dismiss not-confirmed Dependabot alerts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_SPONSOR_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Alerts verified as Not-confirmed by Dynatrace RVA (no runtime CVE detected).
            // Reason: Vulnerable code is not actually used in the monitored environment.
            const alertsToDismiss = [
              // basic-ftp: Not running nor monitored, No RVA findings
              1484,
              // gevent: Confirmed running but no runtime CVE detected, No RVA findings
              1501, 1476, 1553, 1463, 1520, 1531, 1490, 1542,
              // next: Not running nor monitored, No RVA findings
              601
            ];

            for (const alertNumber of alertsToDismiss) {
              try {
                await github.request('PATCH /repos/{owner}/{repo}/dependabot/alerts/{alert_number}', {
                  owner,
                  repo,
                  alert_number: alertNumber,
                  state: 'dismissed',
                  dismissed_reason: 'not_used',
                  dismissed_comment: 'Vulnerability was not observed in the monitored environment by Dynatrace'
                });
                core.info(`Successfully dismissed alert #${alertNumber}`);
              } catch (e) {
                core.warning(`Failed to dismiss alert #${alertNumber}: ${e.message}`);
              }
            }
